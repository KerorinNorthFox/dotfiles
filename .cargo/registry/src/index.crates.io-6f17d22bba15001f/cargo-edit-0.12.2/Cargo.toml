#
# When uploading crates to the registry Cargo will automatically
# "normalize" Cargo.toml files for maximal compatibility
# with all versions of Cargo and also rewrite `path` dependencies
# to registry (e.g., crates.io) dependencies.
#
# If you are reading this file be aware that the original Cargo.toml
# will likely look very different (and much more reasonable).
# See Cargo.toml.orig for the original contents.

[package]
edition = "2021"
name = "cargo-edit"
version = "0.12.2"
authors = [
    "Without Boats <lee@libertad.ucsd.edu>",
    "Pascal Hertleif <killercup@gmail.com>",
    "Sebastian Garrido <sebasgarcep@gmail.com>",
    "Jonas Platte <mail@jonasplatte.de>",
    "Benjamin Gill <git@bgill.eu>",
    "Andronik Ordian <write@reusable.software>",
]
description = "Cargo commands for modifying a `Cargo.toml` file.."
homepage = "https://github.com/killercup/cargo-edit"
documentation = "https://github.com/killercup/cargo-edit/blob/master/README.md#available-subcommands"
readme = "README.md"
keywords = [
    "cargo",
    "cargo-subcommand",
    "cli",
    "dependencies",
    "crates",
]
categories = [
    "development-tools",
    "development-tools::cargo-plugins",
]
license = "Apache-2.0 OR MIT"
repository = "https://github.com/killercup/cargo-edit"

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
min = 1
replace = "{{version}}"
search = "Unreleased"

[[package.metadata.release.pre-release-replacements]]
file = "CHANGELOG.md"
min = 1
replace = "{{date}}"
search = "ReleaseDate"

[[package.metadata.release.pre-release-replacements]]
exactly = 1
file = "CHANGELOG.md"
replace = """
<!-- next-header -->
## Unreleased - ReleaseDate
"""
search = "<!-- next-header -->"

[[bin]]
name = "cargo-add"
path = "src/bin/add/main.rs"
required-features = ["add"]

[[bin]]
name = "cargo-rm"
path = "src/bin/rm/main.rs"
required-features = ["rm"]

[[bin]]
name = "cargo-upgrade"
path = "src/bin/upgrade/main.rs"
required-features = ["upgrade"]

[[bin]]
name = "cargo-set-version"
path = "src/bin/set-version/main.rs"
required-features = ["set-version"]

[dependencies.anyhow]
version = "1.0"

[dependencies.cargo_metadata]
version = "0.15.4"

[dependencies.clap]
version = "4.4.2"
features = [
    "derive",
    "wrap_help",
]
optional = true

[dependencies.clap-cargo]
version = "0.12.0"

[dependencies.concolor-control]
version = "0.0.7"
default-features = false

[dependencies.crates-index]
version = "0.19.13"

[dependencies.dunce]
version = "1.0"

[dependencies.env_proxy]
version = "0.4.1"

[dependencies.git2]
version = "0.17"

[dependencies.hex]
version = "0.4.3"

[dependencies.home]
version = "0.5.5"

[dependencies.indexmap]
version = "1"

[dependencies.pathdiff]
version = "0.2"

[dependencies.regex]
version = "1.9.4"

[dependencies.semver]
version = "1.0.18"
features = ["serde"]

[dependencies.serde]
version = "1.0.188"

[dependencies.serde_derive]
version = "1.0.188"

[dependencies.serde_json]
version = "1.0.105"

[dependencies.subprocess]
version = "0.2.9"

[dependencies.termcolor]
version = "1.2.0"

[dependencies.toml]
version = "0.7.6"

[dependencies.toml_edit]
version = "0.19.14"

[dependencies.url]
version = "2.4.0"

[dev-dependencies.assert_cmd]
version = "2.0.12"
features = ["color-auto"]

[dev-dependencies.assert_fs]
version = "1.0.13"
features = ["color-auto"]

[dev-dependencies.predicates]
version = "3.0.3"
features = ["color"]

[dev-dependencies.snapbox]
version = "0.4.12"
features = [
    "cmd",
    "path",
]

[dev-dependencies.trycmd]
version = "0.14.17"

[dev-dependencies.url]
version = "2.4.0"

[features]
add = ["cli"]
cli = [
    "color",
    "clap",
]
color = ["concolor-control/auto"]
default = [
    "add",
    "rm",
    "upgrade",
    "set-version",
    "vendored-libgit2",
]
rm = ["cli"]
set-version = ["cli"]
test-external-apis = []
upgrade = ["cli"]
vendored-libgit2 = ["git2/vendored-libgit2"]
vendored-openssl = ["git2/vendored-openssl"]

[target."cfg(any(target_arch = \"x86_64\", target_arch = \"arm\", target_arch = \"x86\", target_arch = \"aarch64\"))".dependencies.ureq]
version = "2.7.1"
features = [
    "tls",
    "json",
    "socks",
    "socks-proxy",
]
default-features = false

[target."cfg(not(any(target_arch = \"x86_64\", target_arch = \"arm\", target_arch = \"x86\", target_arch = \"aarch64\")))".dependencies.native-tls]
version = "^0.2"

[target."cfg(not(any(target_arch = \"x86_64\", target_arch = \"arm\", target_arch = \"x86\", target_arch = \"aarch64\")))".dependencies.ureq]
version = "2.7.1"
features = [
    "native-tls",
    "json",
    "socks",
    "socks-proxy",
]
default-features = false
